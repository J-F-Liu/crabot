[package]
name = "crabot"
version = "0.0.0"
edition = "2024"
description = "A smart and powerful coding agent with native GUI."
license = "Apache-2.0"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1"
chrono = "0.4"
rfd = "0.15"
home = "0.5"
adk-rust = { version = "1.0.0", features = ["openai", "anthropic", "openrouter", "deepseek", "groq", "ollama"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
iced = { version = "0.14.0", features = ["advanced"] }
iced_runtime = "0.14.0"
iced_selection = "0.5.0"
